name: Daily k6 smoke test

on:
  workflow_dispatch:
  schedule:
    # Europe time: 20:45 during summer time (18:45 UTC).
    - cron: "45 18 * * *"

jobs:
  k6-cloud:
    name: Run k6 in Grafana Cloud
    runs-on: ubuntu-latest
    env:
      K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
      K6_CLOUD_STACK: ${{ vars.K6_CLOUD_STACK }}
      K6_CLOUD_PROJECT_ID: ${{ vars.K6_CLOUD_PROJECT_ID }}
      BASE_URL: ${{ vars.BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Check Grafana Cloud token
        if: env.K6_CLOUD_TOKEN == ''
        run: |
          echo "K6_CLOUD_TOKEN secret is required."
          exit 1

      - name: Check Grafana Cloud stack
        if: env.K6_CLOUD_STACK == ''
        run: |
          echo "K6_CLOUD_STACK variable is required."
          echo "Use your Grafana Cloud stack slug, for example: qaevgenii"
          exit 1

      - name: Check Grafana Cloud project id
        if: env.K6_CLOUD_PROJECT_ID == ''
        run: |
          echo "K6_CLOUD_PROJECT_ID variable is required."
          echo "Add it in GitHub: Settings -> Secrets and variables -> Actions -> Variables."
          exit 1

      - name: Check target base url
        if: env.BASE_URL == ''
        run: |
          echo "BASE_URL variable is required."
          echo "Add it in GitHub: Settings -> Secrets and variables -> Actions -> Variables."
          exit 1

      - name: Login to Grafana Cloud k6
        run: k6 cloud login --token "$K6_CLOUD_TOKEN" --stack "$K6_CLOUD_STACK"

      - name: Run smoke test in Grafana Cloud
        run: k6 cloud run k6/01-smoke.js
