name: Daily k6 smoke test

on:
  workflow_dispatch:
  schedule:
    # Prague time: 10:00 AM
    - cron: "0 8 * * *"

jobs:
  k6-cloud:
    name: Run k6 in Grafana Cloud
    runs-on: ubuntu-latest
    env:
      K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
      K6_CLOUD_STACK: ${{ vars.K6_CLOUD_STACK || 'qaevgenii' }}
      K6_CLOUD_PROJECT_ID: ${{ vars.K6_CLOUD_PROJECT_ID || '8104573' }}
      BASE_URL: ${{ vars.BASE_URL || 'https://httpbun.com' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Check Grafana Cloud token
        if: env.K6_CLOUD_TOKEN == ''
        run: |
          echo "K6_CLOUD_TOKEN secret is required."
          exit 1

      - name: Check Grafana Cloud stack
        if: env.K6_CLOUD_STACK == ''
        run: |
          echo "K6_CLOUD_STACK variable is required."
          echo "Use your Grafana Cloud stack slug, for example: qaevgenii"
          exit 1

      - name: Login to Grafana Cloud k6
        run: k6 cloud login --token "$K6_CLOUD_TOKEN" --stack "$K6_CLOUD_STACK"

      - name: Run smoke test in Grafana Cloud
        run: k6 cloud run k6/01-smoke.js
